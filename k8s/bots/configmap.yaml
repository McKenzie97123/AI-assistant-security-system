# Stała część eksperymentu — zmieniaj tylko replicas w deployment.yaml
# ATTACK_TYPE: form_spam | login_bruteforce | mixed
apiVersion: v1
kind: ConfigMap
metadata:
  name: bots-config
  namespace: aisys-bots
data:
  TARGET_URL: "http://ai-protection-svc.aisys-protection.svc.cluster.local:8000"
  REQUESTS_PER_SECOND: "2.0"
  ATTACK_TYPE: "form_spam"
  THREAD_COUNT: "3"
  # true  → bot pobiera CSRF token i rozwiązuje CAPTCHA (zaawansowany atak)
  # false → naiwny bot bez tokenów (odrzucony już przez webapp)
  BYPASS_PROTECTION: "true"
