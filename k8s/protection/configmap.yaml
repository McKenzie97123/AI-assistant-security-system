# Zmieniaj PROTECTION_STRATEGY między eksperymentami:
#   rate_limit  — tylko ograniczenie liczby zapytań
#   rules       — detekcja heurystyczna (UA, nagłówki, częstotliwość)
#   ml          — Random Forest na cechach zapytania
#   llm         — analiza przez lokalne Ollama (llama3.2:1b, darmowe)
apiVersion: v1
kind: ConfigMap
metadata:
  name: protection-config
  namespace: aisys-protection
data:
  PROTECTION_STRATEGY: "ml"
  RATE_LIMIT_RPM: "60"
  DETECTION_THRESHOLD: "0.7"
  WEBAPP_URL: "http://webapp-svc.aisys-webapp.svc.cluster.local:8080"
  REDIS_URL: "redis://redis-svc.aisys-protection.svc.cluster.local:6379"
  OLLAMA_URL: "http://ollama-svc.aisys-protection.svc.cluster.local:11434"
  OLLAMA_MODEL: "llama3.2:1b"
